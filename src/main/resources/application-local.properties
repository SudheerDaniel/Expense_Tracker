# Active when SPRING_PROFILES_ACTIVE=local (local Docker Compose dev, talks to MinIO)
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/expenses}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8080

cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=${AWS_REGION:us-east-1}
aws.bucket.name=${AWS_BUCKET_NAME:expense-receipts}

minio.endpoint=${MINIO_ENDPOINT:http://minio:9000}
minio.public.endpoint=${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
ses.access.key=${SES_ACCESS_KEY}
ses.secret.key=${SES_SECRET_KEY}
ses.region=${AWS_SES_REGION:us-east-1}
ses.from.email=${SES_FROM_EMAIL:mjothikasumali@gmail.com}
app.frontend.url=http://localhost:5173

logging.level.com.example.springbootmvcexample=DEBUG
